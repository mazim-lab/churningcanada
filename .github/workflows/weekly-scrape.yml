name: Weekly Card Scraper

on:
  schedule:
    # Run every Sunday at 6 AM UTC (1 AM EST)
    - cron: '0 6 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium firefox
          playwright install-deps

      - name: Run scraper
        run: python scrapers/bank_scraper.py --all

      - name: Build comprehensive databases
        run: python scrapers/bank_scraper.py --build

      - name: Check for changes
        id: changes
        run: |
          git diff --name-only data/ website/src/data/ > /tmp/changed_files.txt
          if [ -s /tmp/changed_files.txt ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            cat /tmp/changed_files.txt
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "ChurningCanada Bot"
          git config user.email "bot@churningcanada.ca"
          git add data/ website/src/data/
          git commit -m "chore: weekly card data update $(date +%Y-%m-%d)"
          git push

      - name: Deploy to Vercel
        if: steps.changes.outputs.has_changes == 'true'
        run: echo "Vercel auto-deploys on push to main"
